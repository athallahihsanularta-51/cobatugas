<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header class="header">
            <h1 class="logo">📊 Productivity Dashboard</h1>
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </header>

        <!-- Greeting Section -->
        <section class="greeting-section">
            <div class="greeting-container">
                <div class="time-date">
                    <div id="currentTime" class="time"></div>
                    <div id="currentDate" class="date"></div>
                </div>
                <div class="greeting">
                    <h2 id="greetingText">Good morning!</h2>
                    <input type="text" id="userName" placeholder="Enter your name" maxlength="20">
                </div>
            </div>
        </section>

        <!-- Main Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Focus Timer -->
            <section class="timer-section">
                <h3>🎯 Focus Timer</h3>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button id="startTimer" class="btn btn-primary">Start</button>
                    <button id="stopTimer" class="btn btn-secondary" disabled>Stop</button>
                    <button id="resetTimer" class="btn btn-secondary">Reset</button>
                </div>
            </section>

            <!-- Quick Links -->
            <section class="links-section">
                <h3>🔗 Quick Links</h3>
                <div class="links-container" id="linksContainer">
                    <div class="link-placeholder">
                        <span>Add your first link</span>
                    </div>
                </div>
                <div class="link-input">
                    <input type="text" id="linkName" placeholder="Link name">
                    <input type="url" id="linkUrl" placeholder="https://example.com">
                    <button id="addLink" class="btn btn-primary">Add</button>
                </div>
            </section>

            <!-- To-Do List -->
            <section class="todo-section">
                <h3>📝 To-Do List <span id="taskCount">0</span></h3>
                <div class="todo-input">
                    <input type="text" id="newTask" placeholder="Add a new task..." maxlength="100">
                    <button id="addTask" class="btn btn-primary">+</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </section>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
