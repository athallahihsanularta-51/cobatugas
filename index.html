<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header class="header">
            <img src="./image/download.png" alt="ini gambar" width="50px">
            <h1 class="logo">Productivity Dashboard</h1>
            <div class="header-controls">
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </header>

        <!-- Greeting Section -->
        <section class="greeting-section">
            <div class="greeting-container">
                <div class="time-date">
                    <div id="currentTime" class="time"></div>
                    <div id="currentDate" class="date"></div>
                </div>
                <div class="greeting">
                    <h2 id="greetingText">Good morning!</h2>
                    <input type="text" id="userName" placeholder="Enter your name" maxlength="25">
                </div>
            </div>
        </section>

        <!-- Main Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Focus Timer -->
            <section class="timer-section">
                <h3>🎯 Focus Timer</h3>
                <div class="timer-presets">
                    <button class="preset-btn active" data-minutes="25">25m</button>
                    <button class="preset-btn" data-minutes="15">15m</button>
                    <button class="preset-btn" data-minutes="5">5m</button>
                    <button class="preset-btn" data-minutes="custom">Custom</button>
                </div>
                <div class="custom-time-input" id="customTimeInput" style="display:none;">
                    <input type="number" id="customMinutes" min="1" max="120" placeholder="min" />
                    <button class="btn btn-primary btn-sm" id="setCustomTime">Set</button>
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button id="startTimer" class="btn btn-primary">▶ Start</button>
                    <button id="stopTimer" class="btn btn-secondary" disabled>⏸ Pause</button>
                    <button id="resetTimer" class="btn btn-secondary">↺ Reset</button>
                </div>
            </section>

            <!-- Quick Links -->
            <section class="links-section">
                <h3>🔗 Quick Links</h3>
                <div class="links-container" id="linksContainer">
                    <div class="link-placeholder">
                        <span>Add your first link</span>
                    </div>
                </div>
                <div class="link-input">
                    <input type="text" id="linkName" placeholder="Link name">
                    <input type="url" id="linkUrl" placeholder="https://example.com">
                    <button id="addLink" class="btn btn-primary">Add</button>
                </div>
            </section>

            <!-- To-Do List -->
            <section class="todo-section">
                <div class="todo-header">
                    <h3>📝 To-Do List <span id="taskCount">0</span></h3>
                    <div class="sort-controls">
                        <button class="sort-btn active" data-sort="added" title="Sort by date added">🕐</button>
                        <button class="sort-btn" data-sort="alpha" title="Sort A–Z">🔤</button>
                        <button class="sort-btn" data-sort="completed" title="Sort by status">✅</button>
                    </div>
                </div>
                <div class="todo-input">
                    <input type="text" id="newTask" placeholder="Add a new task..." maxlength="100">
                    <button id="addTask" class="btn btn-primary">+</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </section>
        </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="js/app.js"></script>
</body>
</html>
